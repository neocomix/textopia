<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>무료 1화 — 텍스토피아</title>
<meta name="description" content="텍스토피아 1부 1장 '먼지 쌓인 기억, 말을 거는 옷들'을 무료로 읽어보세요.">
<link rel="stylesheet" href="assets/styles.css?v=6">
<script src="assets/i18n.js?v=7"></script>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='13' fill='none' stroke='%23C96F8F' stroke-width='3'/%3E%3Ccircle cx='12' cy='12' r='2' fill='%23C96F8F'/%3E%3Ccircle cx='20' cy='12' r='2' fill='%23C96F8F'/%3E%3Ccircle cx='12' cy='20' r='2' fill='%23C96F8F'/%3E%3Ccircle cx='20' cy='20' r='2' fill='%23C96F8F'/%3E%3C/svg%3E">
</head>
<body class="viewer-mode">
<div class="v-progress" id="vProgress"></div>

<header class="v-top" id="vTop">
  <a href="index.html" aria-label="나가기" data-i18n-attr="aria-label:read.nav.exit">←</a>
  <span class="pos" data-i18n="read.nav.pos">텍스토피아 · 1부 1장</span>
  <button id="vSettingsBtn" aria-label="보기 설정" data-i18n-attr="aria-label:read.settings.open">Aa</button>
</header>

<main class="v-body" id="vBody"></main>

<!-- 완독 엔딩 -->
<section class="v-end" id="vEnd" style="display:none">
  <svg class="knot" viewBox="0 0 90 40" aria-hidden="true">
    <path d="M 5,20 C 25,4 35,36 45,20 S 65,4 85,20" fill="none" stroke="var(--stitch)" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="45" cy="20" r="4.5" fill="none" stroke="var(--accent)" stroke-width="2"/>
  </svg>
  <h2 data-i18n="read.end.title">첫 번째 매듭을 지었습니다</h2>
  <p class="t">1부 1장 · 먼지 쌓인 기억, 말을 거는 옷들 — 완독</p>
  <div class="teaser">
    <p class="lead" data-i18n="read.end.teaserLabel">2장 미리보기</p>
    <p id="teaserText"></p>
    <div class="fade"></div>
  </div>
  <a class="btn" href="store.html" onclick="txEvent('cta_buy',{from:'viewer_end'})" style="margin-bottom:12px"><span class="btn-hole"></span><span data-i18n="read.end.next">다음 이야기 계속 읽기</span></a>
  <div><a class="stitch-link" href="world.html" data-i18n="read.end.world">세계관 더 둘러보기</a></div>
</section>

<!-- 설정 시트 -->
<div class="v-settings" id="vSettings">
  <div class="row"><span data-i18n="read.settings.size">글자 크기</span>
    <div class="opts" data-k="size">
      <button data-v="15" data-i18n="read.settings.sizeS">작게</button><button data-v="17" class="on" data-i18n="read.settings.sizeM">기본</button><button data-v="19" data-i18n="read.settings.sizeL">크게</button><button data-v="21" data-i18n="read.settings.sizeXL">더 크게</button>
    </div>
  </div>
  <div class="row"><span data-i18n="read.settings.bg">배경</span>
    <div class="opts" data-k="bgmode">
      <button data-v="light" class="on" data-i18n="read.settings.light">밝게</button><button data-v="sepia" data-i18n="read.settings.sepia">세피아</button><button data-v="dark" data-i18n="read.settings.dark">어둡게</button>
    </div>
  </div>
  <div style="text-align:center;margin-top:4px"><button class="btn btn--ghost btn--sm" id="vSettingsClose" data-i18n="common.drawer.close">닫기</button></div>
</div>

<script src="assets/app.js?v=7"></script>
<script src="assets/chapter1.js?v=5"></script>
<script>
(function(){
  const body = document.getElementById('vBody');
  const data = window.CHAPTER1;
  // 본문 렌더
  let html = `<h1>${data.title}</h1>`;
  data.paras.forEach(p => {
    html += `<p class="${p.c==='voice'?'voice':''}">${p.t}</p>`;
  });
  body.innerHTML = html;
  document.getElementById('teaserText').innerHTML =
    "손목을 휘감은 것은 이미 실이 아니었다. 맥박에 맞춰 뛰는 또 하나의 혈관이었다. 차갑게 얼어붙은 표면 아래에서는 끓는 쇳물 같은 열기가 꿈틀거렸다. \"이거… 놔.\" 실이 움찔했다. 순간, 손목이 조여 왔다…";

  // 진행률 + 완독
  const bar = document.getElementById('vProgress');
  const end = document.getElementById('vEnd');
  let done = false;
  function onScroll(){
    const total = document.documentElement.scrollHeight - innerHeight;
    const p = Math.min(1, scrollY / total);
    bar.style.width = (p*100)+'%';
    localStorage.setItem('tx-read-pos', String(Math.round(p*100)));
    if(!done && p > .985){
      done = true; txEvent('read_done',{ch:1});
    }
  }
  end.style.display = 'block';
  addEventListener('scroll', onScroll, {passive:true});
  // 저장 위치 복원
  const saved = +localStorage.getItem('tx-read-pos') || 0;
  if (saved > 3 && saved < 97){
    requestAnimationFrame(()=>{
      scrollTo(0, (document.documentElement.scrollHeight - innerHeight) * saved/100);
    });
  }
  txEvent('read_start',{ch:1});

  // 상단 바: 탭/스크롤업 표시
  const top = document.getElementById('vTop');
  let last = scrollY;
  addEventListener('scroll', ()=>{
    if (scrollY < last - 4) top.classList.add('show');
    else if (scrollY > last + 4) top.classList.remove('show');
    last = scrollY;
  }, {passive:true});
  body.addEventListener('click', ()=> top.classList.toggle('show'));

  // 설정
  const sheet = document.getElementById('vSettings');
  document.getElementById('vSettingsBtn').addEventListener('click', e=>{ e.stopPropagation(); sheet.classList.toggle('show'); });
  document.getElementById('vSettingsClose').addEventListener('click', ()=> sheet.classList.remove('show'));
  const prefs = JSON.parse(localStorage.getItem('tx-reader')||'{}');
  function apply(){
    document.documentElement.style.setProperty('--reader-size', (prefs.size||17)+'px');
    const m = prefs.bgmode||'light';
    document.body.dataset.reading = m==='sepia' ? 'sepia' : '';
    document.documentElement.dataset.theme = m==='dark' ? 'dark' : (m==='sepia'?'light':document.documentElement.dataset.theme==='dark'&&m==='light'?'light':document.documentElement.dataset.theme);
    if (m==='light') document.documentElement.dataset.theme = 'light';
    if (m==='dark') document.documentElement.dataset.theme = 'dark';
    sheet.querySelectorAll('.opts').forEach(g=>{
      const k=g.dataset.k, cur=String(prefs[k]|| (k==='size'?17:'light'));
      g.querySelectorAll('button').forEach(b=>b.classList.toggle('on', b.dataset.v===cur));
    });
  }
  sheet.addEventListener('click', e=>{
    const b = e.target.closest('.opts button'); if(!b) return;
    const k = b.closest('.opts').dataset.k;
    prefs[k] = k==='size' ? +b.dataset.v : b.dataset.v;
    localStorage.setItem('tx-reader', JSON.stringify(prefs));
    apply();
  });
  apply();
})();
</script>
</body>
</html>
